{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Employee Login — EcoFleet Express</title>

    <script nonce="{{ request.csp_nonce }}">
      (function () {
        try {
          if (localStorage.getItem('ef-theme') !== 'dark') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>

    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicons/favicon-32x32.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <!-- TODO(SECURITY): Generate SRI hash at https://www.srihash.org and add integrity="sha384-..." attribute -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
    <link rel="stylesheet" href="{% static 'css/portal.css' %}" />
</head>
<body class="portal-login-body">

<button class="theme-toggle theme-toggle-floating" id="themeToggle" type="button" aria-label="Toggle light theme" title="Toggle theme">
    <i class="ti ti-sun"></i><i class="ti ti-moon"></i>
</button>

<div class="orbs">
    <div class="orb orb1"></div><div class="orb orb2"></div>
    <div class="orb orb3"></div><div class="orb orb4"></div>
</div>

    <div class="login-card">
      <a href="{% url 'home' %}" class="login-logo">
        <img src="{% static 'images/logo.png' %}" alt="EcoFleet Express" />
      </a>
      <h1 class="login-title">Employee <span class="gradient-text">Portal</span></h1>
      <p class="login-sub">Sign in to access EcoFleet Express tools.</p>

      {% if messages %}
        {% for m in messages %}
        <div class="portal-msg portal-msg-{{ m.tags }}"><i class="ti ti-alert-circle"></i> {{ m }}</div>
        {% endfor %}
      {% endif %}

      <form method="post" class="login-form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.GET.next }}" />

        <label class="login-label">Username</label>
        <input type="text" name="username" class="login-input"
               value="{{ form.username.value|default:'' }}" autofocus required />

        <label class="login-label">Password</label>
        <input type="password" name="password" class="login-input" required />

        <button type="submit" class="btn-primary login-btn">Sign In <i class="ti ti-arrow-right"></i></button>
      </form>

      <a href="{% url 'home' %}" class="login-back"><i class="ti ti-arrow-left"></i> Back to website</a>
    </div>

<script nonce="{{ request.csp_nonce }}">
    (function () {
        var KEY = 'ef-theme';
        function current() {
            return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        }
        document.querySelectorAll('.theme-toggle').forEach(function (btn) {
            btn.setAttribute('aria-pressed', current() === 'light' ? 'true' : 'false');
            btn.addEventListener('click', function () {
                var next = current() === 'light' ? 'dark' : 'light';
                try { localStorage.setItem(KEY, next); } catch (e) {}
                if (next === 'light') {
                    document.documentElement.setAttribute('data-theme', 'light');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                }
                btn.setAttribute('aria-pressed', next === 'light' ? 'true' : 'false');
            });
        });
    })();
</script>
</body>
</html>
