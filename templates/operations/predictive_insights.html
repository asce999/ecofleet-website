<div class="portal-card">
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
        <i class="ti ti-bulb" style="font-size: 20px; color: var(--orange);"></i>
        <h2 style="margin: 0; font-size: 15px; font-weight: 700; color: var(--text);">Predictive Insights</h2>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr; gap: 12px;">
        {% for insight in insights %}
        <div style="display: flex; align-items: start; gap: 12px; padding: 12px 14px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--border);">
            <div style="
                display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
                {% if insight.type == 'warning' %}background: rgba(247,148,29,0.12); color: var(--orange);
                {% elif insight.type == 'danger' %}background: rgba(237,28,36,0.12); color: var(--red);
                {% else %}background: rgba(34,197,94,0.12); color: var(--success);{% endif %}
            ">
                <i class="{{ insight.icon }}"></i>
            </div>
            <div style="font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; padding-top: 6px;">{{ insight.message }}</div>
        </div>
        {% empty %}
        <div style="padding: 12px; color: var(--muted); font-size: 13px; font-style: italic;">
            No operational insights available at this time.
        </div>
        {% endfor %}
    </div>
</div>
