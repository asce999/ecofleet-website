<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; background: var(--surface-2); border: 1px dashed var(--border); border-radius: 14px;">
    <div style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; background: var(--surface-3); border: 1px solid var(--border); color: var(--muted); margin-bottom: 14px;">
        <i class="ti ti-{{ icon|default:'database-off' }}" style="font-size: 20px;"></i>
    </div>
    <div style="font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 4px;">{{ title|default:"No Data Available" }}</div>
    <div style="font-size: 13px; color: var(--muted); max-width: 250px; line-height: 1.4;">{{ message|default:"There is currently no data to display in this view." }}</div>
</div>
