{% if messages %}
<div class="portal-card" style="background: rgba(237, 28, 36, 0.08); border: 1px solid rgba(237, 28, 36, 0.2); border-left: 4px solid var(--red); display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; padding: 18px 24px; border-radius: 18px; color: var(--text);">
    <i class="ti ti-alert-triangle" style="font-size: 22px; color: var(--red); flex-shrink: 0; margin-top: 2px;"></i>
    <div style="flex-grow: 1;">
        <div style="font-size: 14px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 6px; color: var(--text);">CRITICAL ALERTS</div>
        <ul style="margin: 0; padding-left: 20px; font-size: 13px; color: var(--muted); line-height: 1.6;">
            {% for msg in messages %}
            <li>{{ msg }}</li>
            {% endfor %}
        </ul>
    </div>
    <button onclick="this.parentElement.style.display='none'" style="background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-top: -2px; border-radius: 6px; transition: color 0.2s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
        <i class="ti ti-x"></i>
    </button>
</div>
{% endif %}
